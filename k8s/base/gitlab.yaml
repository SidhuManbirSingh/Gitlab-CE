apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: gitlab-config-pvc
  namespace: gitlab
spec:
  accessModes: [ReadWriteOnce]
  resources:
    requests:
      storage: 2Gi
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: gitlab-logs-pvc
  namespace: gitlab
spec:
  accessModes: [ReadWriteOnce]
  resources:
    requests:
      storage: 5Gi
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: gitlab-data-pvc
  namespace: gitlab
spec:
  accessModes: [ReadWriteOnce]
  resources:
    requests:
      storage: 10Gi
---
apiVersion: v1
kind: Service
metadata:
  name: gitlab-service
  namespace: gitlab
spec:
  type: NodePort
  selector:
    app: gitlab
  ports:
    - name: http
      port: 80
      targetPort: 80
      nodePort: 30080
    - name: ssh
      port: 22
      targetPort: 22
      nodePort: 30022
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: gitlab
  namespace: gitlab
spec:
  replicas: 1
  selector:
    matchLabels:
      app: gitlab
  template:
    metadata:
      labels:
        app: gitlab
    spec:
      containers:
        - name: gitlab
          image: gitlab/gitlab-ce:latest
          env:
            - name: GITLAB_OMNIBUS_CONFIG
              valueFrom:
                configMapKeyRef:
                  name: gitlab-config
                  key: GITLAB_OMNIBUS_CONFIG
            - name: GITLAB_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: gitlab-secrets
                  key: gitlab-root-password
          ports:
            - containerPort: 80
            - containerPort: 22
          resources:
            requests:
              memory: "4Gi"
              cpu: "1000m"
            limits:
              memory: "8Gi"
              cpu: "3000m"
          livenessProbe:
            httpGet:
              path: /-/health
              port: 80
            initialDelaySeconds: 180 # GitLab needs time to boot
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /-/readiness
              port: 80
            initialDelaySeconds: 180
            periodSeconds: 10
          volumeMounts:
            - name: gitlab-config-storage
              mountPath: /etc/gitlab
            - name: gitlab-logs-storage
              mountPath: /var/log/gitlab
            - name: gitlab-data-storage
              mountPath: /var/opt/gitlab
      volumes:
        - name: gitlab-config-storage
          persistentVolumeClaim:
            claimName: gitlab-config-pvc
        - name: gitlab-logs-storage
          persistentVolumeClaim:
            claimName: gitlab-logs-pvc
        - name: gitlab-data-storage
          persistentVolumeClaim:
            claimName: gitlab-data-pvc
