apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: gitlab
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s
      evaluation_interval: 15s

    scrape_configs:
      - job_name: 'prometheus'
        static_configs:
          - targets: ['localhost:9090']

      - job_name: 'gitlab'
        metrics_path: /-/metrics
        static_configs:
          - targets: ['gitlab-service.gitlab.svc.cluster.local:80']

      # ONLY scrape nodes via kubelet (safe version)
      - job_name: 'kubernetes-nodes'
        static_configs:
          - targets: ['192.168.49.2:10250']
        scheme: https
        bearer_token_file: /var/run/secrets/kubernetes.io/serviceaccount/token
        tls_config:
          insecure_skip_verify: true

      # ONLY cAdvisor via kubelet
      - job_name: 'kubernetes-cadvisor'
        static_configs:
          - targets: ['192.168.49.2:10250']
        metrics_path: /metrics/cadvisor
        scheme: https
        bearer_token_file: /var/run/secrets/kubernetes.io/serviceaccount/token
        tls_config:
          insecure_skip_verify: true
