version: '3.8'

services:
  postgres:
    image: postgres:16-alpine # Changed the postgres image from v15 to v16 as Gitlab requires version 16 or higher
    container_name: gitlab-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - backend
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}" ]
      interval: 10scp # Changed from 10s to 10scp to prevent GitLab from crashing during CI/CD pipeline execution
      timeout: 5s
      retries: 5

  nginx:
    image: nginx:alpine
    container_name: gitlab-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ../nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ../nginx/ssl:/etc/nginx/ssl:ro
    networks:
      - frontend
    depends_on:
      - gitlab

  gitlab:
    image: gitlab/gitlab-ce:latest
    container_name: gitlab-ce
    restart: unless-stopped
    hostname: ${GITLAB_HOSTNAME}
    environment:
      GITLAB_OMNIBUS_CONFIG: |
        external_url '${GITLAB_EXTERNAL_URL}'
        gitlab_rails['db_adapter'] = 'postgresql'
        gitlab_rails['db_encoding'] = 'unicode'
        gitlab_rails['db_host'] = 'postgres'
        gitlab_rails['db_port'] = 5432
        # Ensure these match your .env variable names exactly
        gitlab_rails['db_database'] = "${POSTGRES_DB}"
        gitlab_rails['db_username'] = "${POSTGRES_USER}"
        gitlab_rails['db_password'] = "${POSTGRES_PASSWORD}"
        gitlab_rails['initial_root_password'] = "${GITLAB_ROOT_PASSWORD}"
        # Explicitly setting the port for Nginx to 8081
        nginx['listen_port'] = 8081
        # Explicitly setting the listen_https to false to disable HTTPS
        nginx['listen_https'] = false

        puma['listen'] = '0.0.0.0'
        puma['port'] = 8083
        gitlab_workhorse['auth_backend'] = "http://localhost:8083"
    ports:
      - "2223:22" # Changed from 2222 to 2223 to avoid conflicts with other services 
    volumes:
      - gitlab_config:/etc/gitlab
      - gitlab_logs:/var/log/gitlab
      - gitlab_data:/var/opt/gitlab
    networks:
      - frontend
      - backend
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8081/-/health" ]
      interval: 60s
      timeout: 10s
      retries: 10
      start_period: 300s
    deploy:
      resources:
        limits:
          memory: 8g # Changed from 4g to 8g to prevent GitLab from crashing during CI/CD pipeline execution
          cpus: '2.0' # Changed from 1.0 to 2.0 to prevent GitLab from crashing during CI/CD pipeline execution

  gitlab-runner:
    image: gitlab/gitlab-runner:latest
    container_name: gitlab-runner
    restart: unless-stopped
    volumes:
      - runner_config:/etc/gitlab-runner
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - backend
    depends_on:
      - gitlab
    deploy:
      resources:
        limits:
          memory: 1G # Changed from 512m to 1g to prevent GitLab Runner from crashing during CI/CD pipeline execution
          cpus: '1.0' # Changed from 0.5 to 1.0 to prevent GitLab Runner from crashing during CI/CD pipeline execution

networks:
  frontend:
    driver: bridge
  backend:
    driver: bridge
    internal: true

volumes:
  postgres_data:
  gitlab_config:
  gitlab_logs:
  gitlab_data:
  runner_config:
